name: personal-safety
region: syd
services:
- name: personal-safety
  github:
    repo: MattQuade/personal-safety
    branch: main
    deploy_on_push: true
  environment_slug: node-js
  instance_size_slug: basic-xxs
  instance_count: 1
  http_port: 8080
  # We force only the essential commands and bypass any auto-detected prisma logic
  build_command: npm install && npm run build
  run_command: npm start
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${safety-db.DATABASE_URL}
databases:
- name: safety-db
  engine: PG
  version: "16"
ingress:
  rules:
  - component:
      name: personal-safety
    match:
      path:
        prefix: /